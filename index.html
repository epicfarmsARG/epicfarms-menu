<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Epic Farms · Menú Núñez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#0F3B2E; --green-faded:#5A6F62; --green-ghost:#8A9D90;
    --cream:#EEE7D6; --cream-warm:#E8DFC9; --cream-deep:#D4C9AC;
    --terra:#B8602B; --terra-bright:#E4854A;
    --rule:rgba(15,59,46,0.16); --rule-strong:rgba(15,59,46,0.30);
    --error:#9A3412;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:var(--cream); color:var(--green);
    font-family:'Cormorant Garamond',serif; -webkit-font-smoothing:antialiased;
    min-height:100vh; position:relative;
  }
  body::before{
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(15,59,46,0.025) 10px, rgba(15,59,46,0.025) 11px),
      repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(15,59,46,0.018) 10px, rgba(15,59,46,0.018) 11px);
  }
  .wrap{ position:relative; z-index:1; max-width:560px; margin:0 auto; padding: 28px 18px 48px; }

  /* HEADER */
  .hdr{ text-align:center; padding-bottom:18px; border-bottom:1.5px solid var(--green); margin-bottom:22px; }
  .hdr-eyebrow{
    font-family:'Inter',sans-serif; font-size:11px; font-weight:600; letter-spacing:.3em;
    color:var(--terra); text-transform:uppercase; margin-bottom:8px;
  }
  .hdr-logo{
    font-family:'Inter',sans-serif; font-weight:800; font-size:clamp(34px,9vw,44px);
    line-height:.9; color:var(--green); letter-spacing:-0.02em;
  }
  .hdr-logo .reg{ font-size:.34em; vertical-align:super; font-weight:700; margin-left:-2px; }
  .hdr-menu{
    font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600;
    font-size:clamp(20px,5.5vw,26px); color:var(--terra); margin-top:4px;
  }
  .hdr-sede{
    margin-top:14px; display:inline-flex; align-items:center; gap:7px;
    font-family:'Inter',sans-serif; font-size:11px; font-weight:600; letter-spacing:.18em;
    color:var(--green-faded); text-transform:uppercase;
    background:var(--cream-warm); border:1px solid var(--rule-strong);
    padding:6px 14px; border-radius:999px;
  }
  .hdr-sede strong{ color:var(--green); font-weight:700; }
  .hdr-sede .dot{ width:6px; height:6px; border-radius:50%; background:var(--terra); }

  /* ===== LOGIN ===== */
  #login-screen{
    min-height:70vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .login-card{
    width:100%; max-width:360px;
    background:var(--cream-warm); border:1.5px solid var(--green);
    border-radius:16px; padding:30px 26px 28px;
    box-shadow:0 14px 36px -12px rgba(15,59,46,0.22);
  }
  .login-title{
    font-size:20px; font-weight:700; color:var(--green); text-align:center; margin-bottom:4px;
  }
  .login-sub{
    font-family:'Cormorant Garamond',serif; font-style:italic; font-size:14px;
    color:var(--green-faded); text-align:center; margin-bottom:22px;
  }
  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-family:'Inter',sans-serif; font-size:10px; font-weight:700;
    letter-spacing:.16em; color:var(--terra); text-transform:uppercase; margin-bottom:6px;
  }
  .field input{
    width:100%; font-family:'Inter',sans-serif; font-size:16px; color:var(--green);
    background:var(--cream); border:1.5px solid var(--rule-strong); border-radius:9px;
    padding:12px 14px; outline:none; transition:border-color .2s;
  }
  .field input:focus{ border-color:var(--terra); }
  .login-btn{
    width:100%; margin-top:8px; font-family:'Inter',sans-serif; font-size:13px; font-weight:700;
    letter-spacing:.1em; text-transform:uppercase; color:var(--cream);
    background:var(--green); border:none; border-radius:9px; padding:14px;
    cursor:pointer; transition:background .2s; -webkit-appearance:none;
  }
  .login-btn:active{ background:var(--green-faded); }
  .login-btn:disabled{ opacity:.6; cursor:default; }
  .login-error{
    margin-top:13px; font-family:'Inter',sans-serif; font-size:12.5px; font-weight:600;
    color:var(--error); text-align:center; display:none;
  }
  .login-error.show{ display:block; }
  .login-foot{
    margin-top:20px; text-align:center; font-family:'Cormorant Garamond',serif;
    font-size:13px; color:var(--green-faded); line-height:1.5;
  }
  .login-loading{ display:none; text-align:center; margin-top:13px; }
  .login-loading.show{ display:block; }
  .spinner{
    width:18px; height:18px; border:2.5px solid var(--rule-strong); border-top-color:var(--terra);
    border-radius:50%; display:inline-block; animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ===== MENU (oculto hasta login) ===== */
  #menu-screen{ display:none; }
  #menu-screen.show{ display:block; }

  .logout-row{
    display:flex; justify-content:flex-end; margin-bottom:-8px;
  }
  .logout-btn{
    font-family:'Inter',sans-serif; font-size:10px; font-weight:600; letter-spacing:.1em;
    color:var(--green-faded); text-transform:uppercase; background:none; border:none;
    cursor:pointer; text-decoration:underline; text-underline-offset:3px;
  }

  .welcome-line{
    text-align:center; font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:15px; color:var(--green-faded); margin:14px 0 6px;
  }
  .welcome-line strong{ color:var(--terra); font-weight:700; font-style:normal; }

  .section-row{ display:flex; align-items:baseline; gap:8px; margin:30px 0 14px; }
  .section-num{ font-size:18px; font-weight:700; color:var(--terra); }
  .section-title{ font-size:19px; font-weight:700; color:var(--green); }
  .section-sub{
    margin-left:auto; font-family:'Inter',sans-serif; font-size:9.5px; font-weight:600;
    letter-spacing:.14em; color:var(--green-faded); text-transform:uppercase; text-align:right;
  }

  .products-grid{ display:flex; flex-direction:column; gap:9px; }
  .product-card{
    background:var(--cream-warm); border:1px solid var(--rule); border-left:3px solid var(--terra);
    border-radius:9px; padding:13px 15px;
    display:flex; flex-wrap:wrap; align-items:baseline; justify-content:space-between; gap:5px 14px;
  }
  .product-name{ font-size:18px; font-weight:700; color:var(--green); flex:1 1 auto; min-width:120px; }
  .product-cat{
    width:100%; font-family:'Inter',sans-serif; font-size:9px; font-weight:600;
    letter-spacing:.16em; color:var(--green-faded); text-transform:uppercase; margin-top:-3px;
  }
  .product-price{ font-family:'Inter',sans-serif; font-size:12.5px; color:var(--green); }
  .product-price strong{ font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:700; color:var(--terra); }

  .price-group{
    border:1px solid var(--rule); border-radius:11px; padding:14px 16px 6px;
    background:rgba(15,59,46,0.025); margin-bottom:13px;
  }
  .price-group-header{
    display:flex; align-items:baseline; gap:9px; border-bottom:1px solid var(--rule);
    padding-bottom:9px; margin-bottom:4px;
  }
  .price-group-num{ font-size:25px; font-weight:700; color:var(--terra); line-height:1; }
  .price-group-label{
    font-family:'Inter',sans-serif; font-size:10px; font-weight:600; letter-spacing:.18em;
    color:var(--green-faded); text-transform:uppercase;
  }

  .strain-row{ padding:9px 0; border-bottom:1px dotted var(--rule); cursor:pointer; }
  .strain-row:last-child{ border-bottom:none; }
  .strain-row.feno{ background:rgba(15,59,46,0.045); border-radius:7px; padding:9px 9px; margin:2px -9px; }

  .strain-main{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .strain-line{ flex:1; min-width:0; }
  .strain-name{ font-size:17px; font-weight:700; color:var(--green); line-height:1.15; }
  .strain-row.feno .strain-name{ font-style:italic; }
  .strain-bank{ font-family:'Inter',sans-serif; font-size:10.5px; color:var(--green-faded); margin-top:2px; }
  .strain-meta{
    font-family:'Inter',sans-serif; font-size:11px; font-weight:600; letter-spacing:.04em;
    color:var(--green); text-transform:uppercase; white-space:nowrap; text-align:right; flex-shrink:0;
    display:flex; align-items:center; gap:5px;
  }
  .strain-dot{ margin:0 1px; color:var(--green-ghost); }
  .strain-thc{ color:var(--terra); font-weight:700; }
  .chev{
    display:inline-block; color:var(--green-ghost); font-size:13px; font-weight:700;
    transition:transform .25s ease; margin-left:2px;
  }
  .strain-row.open .chev{ transform:rotate(180deg); color:var(--terra); }

  .strain-detail{
    max-height:0; overflow:hidden; opacity:0;
    transition:max-height .32s ease, opacity .25s ease, margin .25s ease;
  }
  .strain-row.open .strain-detail{ max-height:420px; opacity:1; margin-top:10px; }
  .detail-row{ display:flex; flex-direction:column; gap:1px; margin-bottom:8px; }
  .detail-label{
    font-family:'Inter',sans-serif; font-size:9px; font-weight:700; letter-spacing:.16em;
    color:var(--terra); text-transform:uppercase; margin-bottom:3px; display:block;
  }
  .detail-val{ font-size:14px; color:var(--green); line-height:1.3; }
  .detail-val.linaje{ font-style:italic; color:var(--green-faded); }
  .detail-pills-wrap{ margin-bottom:9px; }
  .pills{ display:flex; flex-wrap:wrap; gap:5px; margin-top:4px; }
  .pill{
    font-family:'Inter',sans-serif; font-size:10px; font-weight:600;
    background:var(--cream-deep); color:var(--green); border:1px solid var(--rule-strong);
    padding:3px 9px; border-radius:999px; letter-spacing:.02em;
  }
  .detail-quote{
    font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600;
    font-size:15px; color:var(--terra); border-left:2.5px solid var(--terra);
    padding-left:10px; margin:8px 0;
  }
  .detail-desc{ font-size:13.5px; color:var(--green-faded); line-height:1.5; padding-bottom:12px; }

  .ftr{
    margin-top:30px; padding-top:16px; border-top:1.5px solid var(--green);
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  .ftr-line{
    font-family:'Inter',sans-serif; font-size:9.5px; font-weight:600; letter-spacing:.16em;
    color:var(--green-faded); text-transform:uppercase;
  }
  .ftr-line strong{ color:var(--green); margin-right:5px; }
  .ftr-tag{ font-family:'Cormorant Garamond',serif; font-weight:600; color:var(--terra); font-size:15px; }

  @media (min-width:480px){ .wrap{ padding:40px 24px 56px; } }
</style>
</head>
<body>
  <div class="wrap">

    <div class="hdr">
      <div class="hdr-eyebrow">Cannabis Co. · Solo socios</div>
      <div class="hdr-logo">epic farms<span class="reg">®</span></div>
      <div class="hdr-menu">Menú</div>
      <div class="hdr-sede"><span class="dot"></span> Sede <strong>Núñez</strong></div>
    </div>

    <!-- ===== PANTALLA DE LOGIN ===== -->
    <div id="login-screen">
      <div class="login-card">
        <div class="login-title">Acceso de socios</div>
        <div class="login-sub">Ingresá con tu usuario y contraseña</div>

        <form id="login-form">
          <div class="field">
            <label for="user">Usuario</label>
            <input type="text" id="user" autocomplete="username" autocapitalize="off" autocorrect="off" required>
          </div>
          <div class="field">
            <label for="pass">Contraseña</label>
            <input type="password" id="pass" autocomplete="current-password" required>
          </div>
          <button type="submit" class="login-btn" id="login-btn">Ingresar</button>
          <div class="login-loading" id="login-loading"><span class="spinner"></span></div>
          <div class="login-error" id="login-error"></div>
        </form>

        <div class="login-foot">¿No tenés usuario?<br>Pedíselo a Erika o Belén en el club.</div>
      </div>
    </div>

    <!-- ===== MENÚ (se completa después del login) ===== -->
    <div id="menu-screen">
      <div class="logout-row">
        <button class="logout-btn" id="logout-btn">Cerrar sesión</button>
      </div>
      <div class="welcome-line" id="welcome-line"></div>

      <div class="section-row">
        <div class="section-num">01</div>
        <div class="section-title">Productos Epic</div>
        <div class="section-sub">Línea elaborada</div>
      </div>
      <div class="products-grid" id="products-grid"></div>

      <div class="section-row">
        <div class="section-num">02</div>
        <div class="section-title">Flores premium</div>
        <div class="section-sub">Tocá una cepa para ver más</div>
      </div>
      <div id="flowers-grid"></div>

      <div class="ftr">
        <div class="ftr-line"><strong>Epic Farms®</strong> Cannabis Co.</div>
        <div class="ftr-tag">Ease of mind</div>
      </div>
    </div>

  </div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz0RD5EIVOpQqBoDevWlrVdh-qG4gwL8SM8Az-ck4BOn0boXo2Gb212iLNDMwuCKUKj/exec";
  const STORAGE_KEY = "epic_menu_session";

  const loginScreen = document.getElementById('login-screen');
  const menuScreen = document.getElementById('menu-screen');
  const loginForm = document.getElementById('login-form');
  const loginBtn = document.getElementById('login-btn');
  const loginLoading = document.getElementById('login-loading');
  const loginError = document.getElementById('login-error');

  function esc(s){
    const d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }

  function renderMenu(data){
    document.getElementById('welcome-line').innerHTML =
      'Hola, <strong>' + esc(data.nombre) + '</strong> · Sede ' + esc(data.sede);

    // Productos
    const pGrid = document.getElementById('products-grid');
    pGrid.innerHTML = data.productos.map(p => {
      const precios = p.precios.map(pr => '<strong>US$ ' + pr.precio + '</strong> ' + esc(pr.label)).join(' · ');
      return '<div class="product-card">' +
        '<div class="product-name">' + esc(p.nombre) + '</div>' +
        '<div class="product-cat">' + esc(p.categoria) + '</div>' +
        '<div class="product-price">' + precios + '</div>' +
      '</div>';
    }).join('');

    // Flores agrupadas por precio
    const porPrecio = {};
    data.geneticas.forEach(c => {
      if(!porPrecio[c.precio]) porPrecio[c.precio] = [];
      porPrecio[c.precio].push(c);
    });
    const precios = Object.keys(porPrecio).map(Number).sort((a,b)=>a-b);

    const fGrid = document.getElementById('flowers-grid');
    fGrid.innerHTML = precios.map(precio => {
      const cepas = porPrecio[precio].sort((a,b)=>a.nombre.localeCompare(b.nombre));
      const rows = cepas.map(c => {
        const isFeno = c.id === 'epic_feno_hunting';
        const bankLine = isFeno ? 'Selección in-house · consultá al equipo' : esc(c.banco);
        const metaHtml = isFeno
          ? '<span class="strain-type">In-house</span>'
          : '<span class="strain-type">' + esc(c.tipo) + '</span><span class="strain-dot">·</span><span class="strain-thc">' + esc(c.thc) + '</span>';
        const pillsEf = c.efectos.map(e => '<span class="pill">' + esc(e) + '</span>').join('');
        const pillsSab = c.sabores.map(s => '<span class="pill">' + esc(s) + '</span>').join('');
        return '<div class="strain-row' + (isFeno?' feno':'') + '" onclick="this.classList.toggle(' + "'open'" + ')">' +
          '<div class="strain-main">' +
            '<div class="strain-line">' +
              '<div class="strain-name">' + esc(c.nombre) + '</div>' +
              '<div class="strain-bank">' + bankLine + '</div>' +
            '</div>' +
            '<div class="strain-meta">' + metaHtml + '<span class="chev">⌄</span></div>' +
          '</div>' +
          '<div class="strain-detail">' +
            '<div class="detail-row"><span class="detail-label">Linaje</span><span class="detail-val linaje">' + esc(c.linaje) + '</span></div>' +
            '<div class="detail-row"><span class="detail-label">Momento</span><span class="detail-val">' + esc(c.tiempo) + ' · ' + esc(c.energia) + '</span></div>' +
            '<div class="detail-pills-wrap"><span class="detail-label">Efectos</span><div class="pills">' + pillsEf + '</div></div>' +
            '<div class="detail-pills-wrap"><span class="detail-label">Sabores &amp; aroma</span><div class="pills">' + pillsSab + '</div></div>' +
            '<div class="detail-quote">&ldquo;' + esc(c.tag) + '&rdquo;</div>' +
            '<div class="detail-desc">' + esc(c.desc) + '</div>' +
          '</div>' +
        '</div>';
      }).join('');

      return '<div class="price-group">' +
        '<div class="price-group-header">' +
          '<div class="price-group-num">US$ ' + precio + '</div>' +
          '<div class="price-group-label">por gramo</div>' +
        '</div>' +
        '<div class="price-group-strains">' + rows + '</div>' +
      '</div>';
    }).join('');

    loginScreen.style.display = 'none';
    menuScreen.classList.add('show');
  }

  let jsonpCounter = 0;
  function jsonpRequest(url, onSuccess, onError){
    const cbName = 'epicCb_' + (jsonpCounter++) + '_' + Date.now();
    let finished = false;
    let timeoutId;

    function cleanup(){
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timeoutId);
    }

    window[cbName] = function(data){
      if(finished) return;
      finished = true;
      cleanup();
      onSuccess(data);
    };

    const script = document.createElement('script');
    script.src = url + (url.indexOf('?') > -1 ? '&' : '?') + 'callback=' + cbName;
    script.onerror = function(){
      if(finished) return;
      finished = true;
      cleanup();
      onError();
    };
    document.body.appendChild(script);

    timeoutId = setTimeout(function(){
      if(finished) return;
      finished = true;
      cleanup();
      onError();
    }, 12000);
  }

  function doLogin(user, pass, silent){
    if(!silent){
      loginBtn.disabled = true;
      loginLoading.classList.add('show');
      loginError.classList.remove('show');
    }
    const url = APPS_SCRIPT_URL + '?action=login&user=' + encodeURIComponent(user) + '&pass=' + encodeURIComponent(pass);

    jsonpRequest(url, function(data){
      if(data.ok){
        localStorage.setItem(STORAGE_KEY, JSON.stringify({user, pass}));
        renderMenu(data);
      } else {
        if(!silent){
          loginError.textContent = data.error || 'Usuario o contraseña incorrectos';
          loginError.classList.add('show');
        } else {
          localStorage.removeItem(STORAGE_KEY);
        }
      }
      loginBtn.disabled = false;
      loginLoading.classList.remove('show');
    }, function(){
      if(!silent){
        loginError.textContent = 'No se pudo conectar. Probá de nuevo.';
        loginError.classList.add('show');
      }
      loginBtn.disabled = false;
      loginLoading.classList.remove('show');
    });
  }

  loginForm.addEventListener('submit', function(e){
    e.preventDefault();
    const user = document.getElementById('user').value.trim();
    const pass = document.getElementById('pass').value;
    if(!user || !pass) return;
    doLogin(user, pass, false);
  });

  document.getElementById('logout-btn').addEventListener('click', function(){
    localStorage.removeItem(STORAGE_KEY);
    menuScreen.classList.remove('show');
    loginScreen.style.display = 'flex';
    document.getElementById('user').value = '';
    document.getElementById('pass').value = '';
  });

  // Auto-login si hay sesión guardada (revalida contra el servidor cada vez)
  (function(){
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved){
      try {
        const { user, pass } = JSON.parse(saved);
        if(user && pass) doLogin(user, pass, true);
      } catch(e){}
    }
  })();
</script>
</body>
</html>
